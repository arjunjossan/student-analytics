<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: Inter, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md">

        <!-- 🔥 CARD -->
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-200">

            <!-- LOGO -->
            <div class="mb-6 text-center">
                <div class="w-12 h-12 mx-auto mb-3 bg-black text-white flex items-center justify-center rounded-xl text-lg">
                    📊
                </div>

                <h2 class="text-xl font-semibold text-gray-900">
                    Welcome back
                </h2>
                <p class="text-sm text-gray-500 mt-1">
                    Login to your dashboard
                </p>
            </div>

            <!-- FORM -->
            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label class="text-sm text-gray-600">Username</label>
                    <input 
                        type="text" 
                        name="username"
                        required
                        class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:outline-none text-sm"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label class="text-sm text-gray-600">Password</label>
                    <input 
                        type="password" 
                        name="password"
                        required
                        class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:outline-none text-sm"
                    >
                </div>

                <!-- OPTIONS -->
                <div class="flex justify-between text-sm">
                    <label class="flex items-center gap-2 text-gray-600">
                        <input type="checkbox">
                        Remember me
                    </label>
                    <span class="text-gray-500 cursor-pointer hover:underline">
                        Forgot password?
                    </span>
                </div>

                <!-- BUTTON -->
                <button 
                    type="submit"
                    class="w-full bg-black text-white py-2.5 rounded-lg text-sm font-medium hover:opacity-90 transition"
                >
                    Sign in
                </button>

            </form>

        </div>

        <!-- FOOTER -->
        <p class="text-center text-xs text-gray-400 mt-6">
            Student Analytics • Secure Login
        </p>

    </div>

</div>

</body>
</html>
